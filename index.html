<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPU War Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- Markdown rendering + sanitizer -->
<script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
<!-- Supabase JS v2 for auth -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@font-face {
  font-family: 'PixelSans';
  src: url('assets/fonts/FSPixelSansUnicode-Regular.ttf') format('truetype');
}

:root {
  --cyan: #00CCFF;
  --cyan-10: rgba(0,204,255,0.10);
  --cyan-15: rgba(0,204,255,0.15);
  --cyan-25: rgba(0,204,255,0.25);
  --cyan-40: rgba(0,204,255,0.40);
  --cyan-60: rgba(0,204,255,0.60);
  --bg: #0a0b10;
  --bg-2: #0c0d12;
  --surface: #141520;
  --surface-2: #1c1d28;
  --surface-3: #24253a;
  --border: rgba(255,255,255,0.08);
  --border-cyan: rgba(0,204,255,0.2);
  --t1: #ffffff;
  --t2: rgba(255,255,255,0.92);
  --t3: rgba(255,255,255,0.78);
  --green: #34D399;
  --yellow: #FBBF24;
  --red: #F87171;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Outfit', system-ui, -apple-system, sans-serif;
  font-weight: 400;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,204,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,204,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Markdown body styling for chat responses */
.markdown-body p { margin: 0 0 10px; }
.markdown-body p:last-child { margin-bottom: 0; }
.markdown-body ul, .markdown-body ol { margin: 0 0 10px; padding-left: 22px; }
.markdown-body li { margin-bottom: 4px; }
.markdown-body strong { color: #fff; font-weight: 600; }
.markdown-body em { color: rgba(255,255,255,0.8); }
.markdown-body code {
  background: rgba(255,255,255,0.06); padding: 2px 6px;
  border-radius: 4px; font-size: 13px;
  font-family: 'SF Mono', Menlo, Consolas, monospace;
}
.markdown-body pre {
  background: rgba(0,0,0,0.3); padding: 12px;
  border-radius: 8px; overflow-x: auto;
  font-family: 'SF Mono', Menlo, Consolas, monospace;
  font-size: 13px; margin-bottom: 10px;
}
.markdown-body table {
  border-collapse: collapse; width: 100%;
  margin: 10px 0; font-size: 13px;
}
.markdown-body th, .markdown-body td {
  border: 1px solid rgba(255,255,255,0.1); padding: 6px 10px; text-align: left;
}
.markdown-body th { background: rgba(0,204,255,0.06); font-weight: 600; color: #fff; }
.markdown-body a { color: #00CCFF; text-decoration: none; }
.markdown-body a:hover { text-decoration: underline; }
.markdown-body blockquote {
  border-left: 3px solid rgba(0,204,255,0.4); padding-left: 12px;
  color: rgba(255,255,255,0.7); margin: 0 0 10px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border-cyan);
  flex-shrink: 0;
  height: 48px;
  position: relative;
  z-index: 1;
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.header .status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #5ac88c;
  display: inline-block;
  margin-right: 8px;
  animation: pulse 2s ease-in-out infinite;
}

.header .status-dot.error { background: #ff4444; }
.header .status-dot.loading { background: #f59e0b; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.header .refresh-info {
  font-size: 12px;
  font-weight: 400;
  color: var(--t3);
  letter-spacing: 0.5px;
}

.main {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

.canvas-wrap {
  flex: 1;
  display: flex;
  align-items: stretch;
  justify-content: center;
  background: #0a0a14;
  position: relative;
  overflow: hidden;
}

canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.sidebar {
  width: 440px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 20px;
}

.panel {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  padding: 18px;
}

.panel h3 {
  font-size: 14px;
  font-weight: 700;
  color: var(--cyan);
  text-transform: uppercase;
  letter-spacing: 2.5px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.agent-row {
  display: flex;
  align-items: center;
  padding: 10px 4px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}

.agent-row:hover { background: var(--cyan-10); }
.agent-row:last-child { border-bottom: none; }

.agent-row .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 12px;
  flex-shrink: 0;
  box-shadow: 0 0 8px currentColor;
}

.agent-row .dot.green { background: var(--green); color: var(--green); }
.agent-row .dot.yellow { background: var(--yellow); color: var(--yellow); }
.agent-row .dot.red { background: var(--red); color: var(--red); }
.agent-row .dot.gray { background: rgba(255,255,255,0.2); box-shadow: none; }

.agent-row .name {
  flex: 1;
  font-size: 16px;
  font-weight: 500;
  color: var(--t2);
}

.agent-row .status-text {
  font-size: 13px;
  font-weight: 400;
  color: var(--t3);
}

.kpi-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.kpi-box {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
}

.kpi-box .value {
  font-size: 36px;
  font-weight: 800;
  color: var(--cyan);
  line-height: 1.1;
}

.kpi-box .label {
  font-size: 11px;
  font-weight: 600;
  color: var(--t3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 6px;
}

.activity-log {
  max-height: 220px;
  overflow-y: auto;
}

.activity-log .entry {
  font-size: 13px;
  font-weight: 400;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  color: var(--t3);
}

.activity-log .entry:last-child { border-bottom: none; }

.activity-log .entry .time {
  color: rgba(255,255,255,0.4);
  margin-right: 8px;
  font-variant-numeric: tabular-nums;
}

.activity-log .entry .agent-tag {
  color: var(--cyan);
  font-weight: 600;
  margin-right: 8px;
}

.tooltip {
  position: fixed;
  background: var(--surface-2);
  border: 1px solid var(--border-cyan);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  font-size: 14px;
  color: var(--t2);
  pointer-events: none;
  z-index: 100;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px var(--cyan-15);
  max-width: 380px;
  backdrop-filter: blur(10px);
}

.tooltip .tt-name {
  color: var(--cyan);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
  letter-spacing: 0.5px;
}

.tooltip .tt-status {
  color: var(--green);
  font-size: 14px;
  font-weight: 500;
}

.tooltip .tt-detail {
  color: var(--t3);
  font-size: 13px;
  font-weight: 400;
  margin-top: 6px;
  line-height: 1.5;
}

@media (max-width: 900px) {
  .main { flex-direction: column; }
  .sidebar { width: 100%; max-height: 40vh; border-left: none; border-top: 2px solid #1e1e2e; }
}
</style>
</head>
<body>

<div class="header">
  <div style="display: flex; align-items: center;">
    <span class="status-dot" id="globalDot"></span>
    <h1>LPU War Room</h1>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <div class="refresh-info" id="refreshInfo">Connecting...</div>
    <div id="userBadge" style="display:none;align-items:center;gap:10px;color:rgba(255,255,255,0.7);font-size:13px;">
      <span id="userBadgeName"></span>
      <span onclick="signOut()" title="Sign out"
            style="cursor:pointer;color:rgba(255,255,255,0.4);font-size:12px;">Sign out</span>
    </div>
  </div>
</div>

<div class="main">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="office"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="sidebar">
    <div class="panel">
      <h3>Agent Status</h3>
      <div id="agentList"></div>
    </div>

    <div class="panel">
      <h3>24h KPIs</h3>
      <div class="kpi-grid" id="kpiGrid">
        <div class="kpi-box"><div class="value" id="kpiJobsPub">--</div><div class="label">Jobs Published</div></div>
        <div class="kpi-box"><div class="value" id="kpiApps">--</div><div class="label">Applications</div></div>
        <div class="kpi-box"><div class="value" id="kpiMatches">--</div><div class="label">Matches</div></div>
        <div class="kpi-box"><div class="value" id="kpiOutreach">--</div><div class="label">Outreach Sent</div></div>
      </div>
    </div>

    <div class="panel">
      <h3>Activity Feed</h3>
      <div class="activity-log" id="activityLog">
        <div class="entry"><span class="time">--:--</span> Waiting for data...</div>
      </div>
    </div>

    <div class="panel">
      <h3>Pipeline Health</h3>
      <div id="pipelineHealth" style="font-size: 16px; color: #888;">Loading...</div>
    </div>

  </div>
</div>

<!-- Floating Top Bot chat window -->
<div id="chatFloat" style="
  position: fixed; bottom: 24px; right: 24px; width: 560px; z-index: 50;
  font-family: 'Outfit', system-ui, sans-serif;
">
  <!-- Collapsed tab -->
  <div id="chatTab" onclick="toggleChat()" style="
    background: var(--surface); border: 1px solid var(--border-cyan);
    border-radius: var(--radius-sm);
    padding: 14px 22px; cursor: pointer; display: flex; align-items: center; gap: 14px;
    user-select: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: border-color 0.2s;
  " onmouseover="this.style.borderColor='var(--cyan)'" onmouseout="this.style.borderColor='var(--border-cyan)'">
    <span style="color: var(--cyan); font-size: 14px; font-weight: 700; letter-spacing: 2px;">TOP BOT</span>
    <span id="chatDot" style="width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-left: auto; box-shadow: 0 0 8px var(--green);"></span>
  </div>

  <!-- Expanded window -->
  <div id="chatWindow" style="
    display: none; background: var(--surface);
    border: 1px solid var(--border-cyan);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 0 0 1px var(--cyan-15);
  ">
    <!-- Title bar (draggable) -->
    <div id="chatTitleBar" style="
      background: var(--surface-2); padding: 14px 20px; cursor: move; display: flex;
      align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      user-select: none;
    ">
      <div style="display: flex; align-items: center; gap: 12px;">
        <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green);"></span>
        <span style="color: var(--cyan); font-size: 13px; font-weight: 700; letter-spacing: 2.5px;">TOP BOT</span>
      </div>
      <div style="display: flex; gap: 14px; align-items: center;">
        <span onclick="newConversation()" title="New conversation"
              style="color: var(--t3); font-size: 13px; cursor: pointer; letter-spacing: 1px;">NEW</span>
        <span onclick="toggleChat()" style="color: var(--t3); font-size: 22px; cursor: pointer; line-height: 1; font-weight: 300;">&times;</span>
      </div>
    </div>

    <!-- Messages -->
    <div id="chatMessages" style="
      height: 380px; overflow-y: auto; padding: 20px 22px;
      font-size: 15px; font-weight: 400; color: var(--t2); line-height: 1.6;
      background: var(--bg-2);
    ">
      <div style="color: var(--t3); font-style: italic; opacity: 0.6;">Send a message to Top Bot...</div>
    </div>

    <!-- Input -->
    <div style="display: flex; gap: 10px; padding: 16px 20px; border-top: 1px solid var(--border); background: var(--surface-2);">
      <input type="text" id="chatInput" placeholder="Talk to Top Bot..."
        style="flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--t1);
        padding: 12px 16px; font-family: 'Outfit', system-ui, sans-serif; font-size: 15px;
        font-weight: 400; border-radius: var(--radius-sm); outline: none;
        transition: border-color 0.2s;"
        onfocus="this.style.borderColor='var(--cyan-40)'"
        onblur="this.style.borderColor='var(--border)'"
        onkeydown="if(event.key==='Enter')sendChat()" />
      <button onclick="sendChat()"
        style="background: var(--cyan); color: var(--bg); border: none; padding: 12px 24px;
        font-family: 'Outfit', system-ui, sans-serif; font-size: 14px;
        font-weight: 700; letter-spacing: 1px; border-radius: var(--radius-sm);
        cursor: pointer; text-transform: uppercase;">
        Send
      </button>
    </div>
  </div>
</div>

<script>
// =====================================================================
// LPU War Room - Pixel Office Dashboard
// =====================================================================

const TILE = 16;
const ZOOM = 2;
const COLS = 21;
const ROWS = 12;
const T = TILE * ZOOM; // pixels per tile at zoom (32)

const SPRITE_W = 16;
const SPRITE_H = 24;
const FRAME_COLS = 7;
const ANIM_SPEED = 14; // canvas frames per sprite step

const BACKEND = 'https://lpu-agent-backend.up.railway.app';

// ── Auth: Supabase email + password ──────────────────────────────────
const SUPABASE_URL = 'https://uwfzroqgccijhhrfytne.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3Znpyb3FnY2NpamhocmZ5dG5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTg0NTQsImV4cCI6MjA5MTQ3NDQ1NH0.FdANLpA7ILDcahCCVCRiYtisaH3p2laBXcB536C92UU';

// Wait for the Supabase UMD bundle to be available (CDN may still be loading).
async function waitForSupabase(timeoutMs = 5000) {
  const start = Date.now();
  while (Date.now() - start < timeoutMs) {
    if (window.supabase && typeof window.supabase.createClient === 'function') return true;
    await new Promise(r => setTimeout(r, 50));
  }
  return !!(window.supabase && window.supabase.createClient);
}

let sb = null;  // Lazy-initialized after CDN loads

let AUTH = null;                  // "Bearer <jwt>" or null
let CURRENT_USER = null;          // { id, email, user_id, tier, display_name }

async function handleRecoveryTokenFromUrl() {
  // Supabase recovery links arrive with #access_token=...&refresh_token=...&type=recovery
  const hash = window.location.hash.slice(1);
  if (!hash || !hash.includes('access_token')) return false;
  const params = new URLSearchParams(hash);
  const access_token = params.get('access_token');
  const refresh_token = params.get('refresh_token');
  const type = params.get('type');
  if (!access_token) return false;
  // Set the session from the URL tokens, then show the set-password form
  const { error } = await sb.auth.setSession({ access_token, refresh_token });
  if (error) return false;
  // Clear hash so reload doesn't re-trigger
  history.replaceState(null, '', window.location.pathname + window.location.search);
  if (type === 'recovery') {
    showSetPasswordForm();
    return true;
  }
  return false;
}

async function resolveCurrentUser() {
  const { data, error } = await sb.auth.getSession();
  if (error || !data.session) return null;
  const session = data.session;
  AUTH = `Bearer ${session.access_token}`;
  const meta = session.user.user_metadata || {};
  CURRENT_USER = {
    id: session.user.id,
    email: session.user.email,
    user_id: meta.user_id || session.user.email.split('@')[0],
    tier: meta.tier || 'operations',
    display_name: meta.display_name || session.user.email,
  };
  return CURRENT_USER;
}

function showLoginForm(errorMsg) {
  const existing = document.getElementById('authOverlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = 'authOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,11,16,0.92);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:Outfit,system-ui,sans-serif;';
  overlay.innerHTML = `
    <div style="background:#141520;border:1px solid rgba(0,204,255,0.2);border-radius:16px;padding:44px;max-width:460px;width:90%;box-shadow:0 24px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,204,255,0.1);">
      <div style="text-align:center;margin-bottom:32px;">
        <h1 style="color:#00CCFF;font-weight:800;letter-spacing:4px;font-size:22px;margin:0 0 8px;text-transform:uppercase;">LPU War Room</h1>
        <p style="color:rgba(255,255,255,0.6);font-size:14px;margin:0;">Sign in to your operator account.</p>
      </div>
      <label style="display:block;color:rgba(255,255,255,0.8);font-size:13px;font-weight:500;margin-bottom:6px;">Email</label>
      <input type="email" id="loginEmail" placeholder="you@locumsunited.com" autocomplete="email"
        style="width:100%;box-sizing:border-box;background:#0a0b10;border:1px solid rgba(255,255,255,0.08);color:#fff;padding:12px 14px;font-family:inherit;font-size:15px;border-radius:10px;outline:none;margin-bottom:16px;transition:border-color 0.15s;"
        onfocus="this.style.borderColor='rgba(0,204,255,0.4)'"
        onblur="this.style.borderColor='rgba(255,255,255,0.08)'" />
      <label style="display:block;color:rgba(255,255,255,0.8);font-size:13px;font-weight:500;margin-bottom:6px;">Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password"
        style="width:100%;box-sizing:border-box;background:#0a0b10;border:1px solid rgba(255,255,255,0.08);color:#fff;padding:12px 14px;font-family:inherit;font-size:15px;border-radius:10px;outline:none;margin-bottom:20px;transition:border-color 0.15s;"
        onfocus="this.style.borderColor='rgba(0,204,255,0.4)'"
        onblur="this.style.borderColor='rgba(255,255,255,0.08)'" />
      <button id="loginBtn"
        style="width:100%;background:#00CCFF;color:#0a0b10;border:none;padding:13px 32px;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border-radius:10px;cursor:pointer;transition:filter 0.15s;"
        onmouseover="this.style.filter='brightness(1.1)'" onmouseout="this.style.filter='brightness(1)'">
        Sign in
      </button>
      <div style="text-align:center;margin-top:20px;">
        <a id="forgotPassword" style="color:rgba(255,255,255,0.5);font-size:13px;cursor:pointer;text-decoration:none;">Forgot password?</a>
      </div>
      <div id="loginError" style="margin-top:16px;color:#F87171;font-size:13px;text-align:center;min-height:18px;">${errorMsg || ''}</div>
    </div>`;
  document.body.appendChild(overlay);
  const emailInput = document.getElementById('loginEmail');
  const passInput = document.getElementById('loginPassword');
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  async function submit() {
    const email = emailInput.value.trim();
    const password = passInput.value;
    if (!email || !password) return;
    btn.disabled = true;
    btn.textContent = 'Signing in...';
    errEl.textContent = '';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      errEl.textContent = error.message || 'Invalid credentials.';
      btn.disabled = false;
      btn.textContent = 'Sign in';
      return;
    }
    await resolveCurrentUser();
    overlay.remove();
    onAuthReady();
  }
  btn.addEventListener('click', submit);
  passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
  emailInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') passInput.focus(); });
  document.getElementById('forgotPassword').addEventListener('click', async () => {
    const email = emailInput.value.trim();
    if (!email) { errEl.textContent = 'Enter your email above first.'; return; }
    errEl.style.color = '#00CCFF';
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname,
    });
    if (error) {
      errEl.style.color = '#F87171';
      errEl.textContent = error.message || 'Reset failed.';
    } else {

function loadImage(src) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null); // graceful fallback
    img.src = src;
  });
}

// ── Sprite draw helpers ───────────────────────────────────────────────
// Draw a sprite scaled to ZOOM, anchored at tile col/row (top-left pixel)
// ox/oy = pixel offsets within that tile position
function spr(img, col, row, ox = 0, oy = 0, dw = null, dh = null) {
  if (!img) return;
  const x = col * T + ox;
  const y = row * T + oy;
  const w = dw !== null ? dw : img.naturalWidth * ZOOM;
  const h = dh !== null ? dh : img.naturalHeight * ZOOM;
  ctx.drawImage(img, x, y, w, h);
}

// Draw a floor tile (16x16 source) into a single tile cell
function floorTile(img, col, row) {
  if (!img) return;
  ctx.drawImage(img, 0, 0, 16, 16, col * T, row * T, T, T);
}

// ── Floor rendering ───────────────────────────────────────────────────
function drawFloor() {
  // Solid warm oak palette. No PNGs. High contrast with characters.
  const colors = {
    0:   '#1a1520',   // walls: near-black
    1:   '#5a4230',   // right room: warm oak
    7:   '#5a4230',   // left room: warm oak (same)
    9:   '#3a2a1a',   // break room: dark walnut
    255: '#0a0a14',   // void
  };

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tileId = OFFICE_TILES[r][c];
      ctx.fillStyle = colors[tileId] || '#0a0a14';
      ctx.fillRect(c * T, r * T, T, T);

      // Subtle grid lines between floor tiles (not walls or void)
      if (tileId !== 0 && tileId !== 255) {
        ctx.fillStyle = '#3a2a18';
        ctx.fillRect(c * T, r * T, T, 1);       // top edge
        ctx.fillRect(c * T, r * T, 1, T);       // left edge
      }
    }
  }

  // Top border accent line
  ctx.fillStyle = '#00CCFF';
  ctx.fillRect(0, 0, COLS * T, 2);
}

// ── Static decorative furniture ────────────────────────────────────────
// Positions are in tile coordinates (col, row = top-left anchor of the sprite)
// Sprites with height > 1 tile overhang upward (pixel art isometric convention)

function drawDecor() {
  // ---- Left room (warm wood) ----

  // Bookshelves along top wall (row 0, wall tiles)
  // BOOKSHELF is 32x16 source (2 tiles wide, 1 tile tall visually)
  spr(SPR.bookshelf, 2, 0);  // col 2-3
  spr(SPR.bookshelf, 5, 0);  // col 5-6

  // Clock on top wall
  // CLOCK is 16x32 source -- hangs down from wall row
  spr(SPR.clock, 8, 0);

  // Large plant in corner (bottom-left of left room)
  // LARGE_PLANT is 32x48 source (2w x 3h tiles) -- anchor bottom-left
  spr(SPR.large_plant, 1, 8, 0, -T); // row 8, overhang up 1 tile

  // Small plant near entrance
  spr(SPR.plant, 8, 7, 0, -T);

  // Bin near wall exit
  // BIN is 16x16 source
  spr(SPR.bin, 1, 10);

  // ---- Right room (blue-gray) ----

  // Whiteboard on top wall
  // WHITEBOARD is 32x32 source (2w x 2h)
  spr(SPR.whiteboard, 13, 0, 0, -T);

  // Plant in top-right corner
  spr(SPR.plant, 18, 1, 0, -T);

  // Large plant bottom-right corner
  spr(SPR.large_plant, 17, 7, 0, -T);

  // ---- Break room (bottom-right) ----

  // Coffee mugs on a table in break room (row 9-10)
  spr(SPR.coffee, 14, 9);
  spr(SPR.coffee, 15, 9);

  // Bin in break room corner
  spr(SPR.bin, 18, 10);
}

// ── Agent desks + PC + chairs ─────────────────────────────────────────
// DESK_FRONT: 48x32 source (3 tiles wide, 2 tiles tall)
//   Drawn so the desk top surface aligns with `row`, overhangs into row+1
// WOODEN_CHAIR_FRONT: 16x32 source (1w x 2h)
//   Chair sits in front of the desk (row+2), centered under the middle tile
// PC_FRONT: 16x32 source (1w x 2h)
//   Sits on top of the desk surface (row-1 visually), centered

function getPCSprite(agentKey) {
  const s = state.agents[agentKey];
  if (!s || s.status !== 'active') return SPR.pc_off;
  const step = Math.floor(frameCount / (ANIM_SPEED * 2)) % 3;
  return [SPR.pc_on_1, SPR.pc_on_2, SPR.pc_on_3][step];
}

function drawDeskUnit(agent) {
  const { col, row } = agent.desk;

  // DESK_FRONT: 48px wide, 32px tall source
  // Render at 2x: 96px wide (3 tiles), 64px tall (2 tiles)
  // Position: top-left = (col, row), overhangs down to row+1
  spr(SPR.desk_front, col, row);

  // PC: sits ON the desk surface, centered on middle tile
  // DESK_FRONT is 48x32 source drawn at (col, row). Desk surface top = row * T.
  // PC_FRONT is 16x32 source. We want the PC base to rest on the desk top.
  // PC base bottom = row * T (desk top edge), PC top = row*T - 32*ZOOM
  const pcImg = getPCSprite(agent.key);
  if (pcImg) {
    const pcW = 16 * ZOOM;
    const pcH = 32 * ZOOM;
    const pcX = (col + 1) * T + (T - pcW) / 2; // centered on middle desk tile
    const pcY = row * T - pcH + 4 * ZOOM;       // base sits just on desk top
    ctx.drawImage(pcImg, pcX, pcY, pcW, pcH);
  }

  // Chair: WOODEN_CHAIR_FRONT is 16x32 source -> 32x64 at 2x
  // Place in front of desk, centered under middle desk tile
  // Chair top = row+2 tile minus chair height
  const chairX = (col + 1) * T;
  // Chair sits at row+2, visually overhangs up, so anchor its top at row+1
  spr(SPR.chair_front, col + 1, row + 2, 0, -T);
}

// ── Characters ───────────────────────────────────────────────────────
function drawCharacter(agent) {
  const charImg = SPR.chars[agent.char];
  if (!charImg) return;

  const agentState = state.agents[agent.key];
  const isActive = agentState && agentState.status === 'active';
  const hasError = agentState && agentState.errors > 0;

  // Sprite sheet: 7 frames x 4 directions
  // Direction 0 = down (facing toward viewer)
  // Active: cycle frames 1-4 (typing); idle: frame 0
  const animFrame = isActive
    ? (Math.floor(frameCount / ANIM_SPEED) % 4) + 1
    : 0;

  const sx = animFrame * SPRITE_W;
  const sy = 0; // direction 0 = down

  // Character sits in front of the desk (row+2 area), centered on middle desk tile
  // Character is 16x24 source -> 32x48 at 2x
  const { col, row } = agent.desk;
  const cx = (col + 1) * T; // middle tile x
  // Place character so feet land at row+3 tile top
  const cy = (row + 3) * T - SPRITE_H * ZOOM;

  ctx.drawImage(
    charImg,
    sx, sy, SPRITE_W, SPRITE_H,
    cx, cy, SPRITE_W * ZOOM, SPRITE_H * ZOOM
  );

  // Name tag
  ctx.fillStyle = agent.color;
  ctx.font = `bold ${6 * ZOOM}px PixelSans, monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(agent.short, cx + (SPRITE_W * ZOOM) / 2, cy + SPRITE_H * ZOOM + 7 * ZOOM);
  ctx.textAlign = 'left';

  // Status dot (top-right of sprite)
  const dotX = cx + SPRITE_W * ZOOM + 3;
  const dotY = cy + 5;
  ctx.beginPath();
  ctx.arc(dotX, dotY, 3 * ZOOM, 0, Math.PI * 2);
  ctx.fillStyle = hasError ? '#ff4444' : isActive ? '#5ac88c' : '#444';
  ctx.fill();

  // Hitbox for tooltip
  agent._hitbox = { x: cx, y: cy, w: SPRITE_W * ZOOM, h: SPRITE_H * ZOOM };
}

// ── Render loop ───────────────────────────────────────────────────────
let frameCount = 0;

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1. Floor
  drawFloor();

  // 2. Static decor (bookshelves, plants, whiteboard, etc.)
  drawDecor();

  // 3. Desks + PCs + chairs (back-to-front: lower rows last so they render on top)
  // Sort by row so agents deeper in scene render first
  const sorted = [...AGENTS].sort((a, b) => a.desk.row - b.desk.row);
  for (const agent of sorted) {
    drawDeskUnit(agent);
  }

  // 4. Characters (always in front of desks)
  for (const agent of sorted) {
    drawCharacter(agent);
  }

  frameCount++;
  requestAnimationFrame(render);
}

// ── Tooltip ───────────────────────────────────────────────────────────
const tooltipEl = document.getElementById('tooltip');

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  // Account for CSS scaling if canvas is scaled by the browser
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  let found = null;
  for (const a of AGENTS) {
    if (!a._hitbox) continue;
    const h = a._hitbox;
    if (mx >= h.x && mx <= h.x + h.w && my >= h.y && my <= h.y + h.h) {
      found = a;
      break;
    }
  }

  if (found) {
    const s = state.agents[found.key] || {};
    const errText = s.errors > 0 ? ` (${s.errors} errors)` : '';
    tooltipEl.innerHTML = `
      <div class="tt-name">${found.name}</div>
      <div class="tt-status">${s.status || 'unknown'}${errText}</div>
      <div class="tt-detail">${s.detail || 'No data yet'}</div>
    `;
    tooltipEl.style.display = 'block';
    tooltipEl.style.left = (e.clientX + 14) + 'px';
    tooltipEl.style.top  = (e.clientY - 44) + 'px';
  } else {
    tooltipEl.style.display = 'none';
  }
});

canvas.addEventListener('mouseleave', () => {
  tooltipEl.style.display = 'none';
});

// ── Data fetching ─────────────────────────────────────────────────────
async function fetchJSON(path, body) {
  if (!AUTH) return null;
  try {
    const res = await fetch(`${BACKEND}${path}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': AUTH,
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      if (res.status === 401) {
        state.connected = false;
        updateConnectionDot();
        console.error('[War Room] 401 on', path, '- token may be invalid');
      }
      return null;
    }
    state.connected = true;
    updateConnectionDot();
    return await res.json();
  } catch (err) {
    state.connected = false;
    updateConnectionDot();
    console.error('[War Room] fetch error:', path, err.message);
    return null;
  }
}

function updateConnectionDot() {
  const dot = document.getElementById('globalDot');
  const info = document.getElementById('refreshInfo');
  if (state.connected) {
    dot.className = 'status-dot';
    info.textContent = state.lastRefresh
      ? `Updated ${Math.round((Date.now() - state.lastRefresh) / 1000)}s ago`
      : 'Connected';
  } else {
    dot.className = 'status-dot error';
    info.textContent = 'Connection failed (check token)';
  }
}

function addActivity(agent, text) {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  state.activityLog.unshift({ time, agent, text });
  if (state.activityLog.length > 50) state.activityLog.pop();
  renderActivityLog();
}

async function refreshAgentStatuses() {
  for (const agent of AGENTS) {
    const data = await fetchJSON('/manager/tools/get_agent_status', {
      agent_key: agent.key,
      hours: 24,
    });
    if (data) {
      const prev = state.agents[agent.key];
      state.agents[agent.key] = {
        status: data.sessions_in_window > 0 ? 'active' : 'idle',
        lastRun: data.last_session_at,
        lastStopReason: data.last_stop_reason,
        errors: data.recent_errors || 0,
        sessions: data.sessions_in_window || 0,
        toolCalls: data.tool_call_count_in_window || 0,
        detail: data.detail || '',
      };
      if (prev && prev.status !== state.agents[agent.key].status) {
        addActivity(agent.short, `status changed to ${state.agents[agent.key].status}`);
      }
    }
  }
  state.connected = true;
  renderAgentList();
}

async function refreshKPIs() {
  const data = await fetchJSON('/manager/tools/get_recruitment_kpis', {
    windows_hours: [24],
  });
  if (data && data.windows && data.windows['24h']) {
    state.kpis = data.windows['24h'];
    renderKPIs();
  }
}

async function refreshPipelineHealth() {

  if (data && data.summary) {

}

  const el = document.getElementById('agentList');

    const statusText = s.status === 'active'
      ? `${s.sessions} sessions, ${s.toolCalls} calls`
      : state.connected
      ? 'Idle'
      : 'Offline';
    const displayName = a.name.includes(': ') ? a.name.split(': ')[1] : a.name;
    return `
      <div class="agent-row">
        <span class="dot ${dotClass}"></span>
        <span class="name" style="color: ${a.color}; flex: 0 0 auto; margin-right: 4px;">${a.short}</span>
        <span class="name">${displayName}</span>

  const dot = document.getElementById('globalDot');
  const hasErrors = AGENTS.some(a => (state.agents[a.key] || {}).errors > 0);
  dot.className = 'status-dot' + (hasErrors ? ' error' : state.connected ? '' : ' loading');
}

// ── Main loop ─────────────────────────────────────────────────────────
async function pollData() {
  try {
    await refreshAgentStatuses();
    await refreshKPIs();
    await refreshPipelineHealth();
    state.lastRefresh = Date.now();
    addActivity('SYS', 'Data refreshed');

// ── Top Bot Chat ─────────────────────────────────────────────────────
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
let chatHistory = [];

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Markdown renderer (marked + DOMPurify) ───────────────────────────
if (window.marked) {
  marked.setOptions({ breaks: true, gfm: true, headerIds: false, mangle: false });
}
// Parse [chip text] patterns that stand alone on a line (or separated by spaces)
// and render them as clickable quick-reply chips. Returns { textSansChips, chips }.
function extractChips(text) {
  const lines = text.split('\n');
  const chipLines = [];
  const kept = [];
  const chipPattern = /\[([^\[\]\n]{1,80})\]/g;
  for (const line of lines) {
    const trimmed = line.trim();
    // A "chip line" is one where content is entirely made of [..] chips and whitespace
    const withoutChips = trimmed.replace(chipPattern, '').trim();
    const hasChips = chipPattern.test(trimmed);
    chipPattern.lastIndex = 0;
    if (hasChips && withoutChips === '') {
      let m;
      while ((m = chipPattern.exec(trimmed)) !== null) {
        chipLines.push(m[1].trim());
      }
      chipPattern.lastIndex = 0;
    } else {
      kept.push(line);
    }
  }
  return { textSansChips: kept.join('\n').trim(), chips: chipLines };
}

function renderMarkdown(text) {
  if (!window.marked || !window.DOMPurify) {
    return escapeHtml(text).replace(/\n/g, '<br>');
  }
  const rawHtml = marked.parse(text || '');
  return DOMPurify.sanitize(rawHtml, {
    ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'ul', 'ol', 'li', 'code', 'pre', 'blockquote',
                   'h1', 'h2', 'h3', 'h4', 'table', 'thead', 'tbody', 'tr', 'th', 'td', 'a', 'hr'],
    ALLOWED_ATTR: ['href', 'target', 'rel'],
  });
}

function renderChips(container, chipTexts) {
  if (!chipTexts || chipTexts.length === 0) return;
  container.innerHTML = '';
  container.style.display = 'flex';
  container.style.flexWrap = 'wrap';
  container.style.gap = '8px';
  container.style.marginTop = '12px';
  for (const text of chipTexts) {
    const chip = document.createElement('button');
    chip.textContent = text;
    chip.style.cssText = `
      background: rgba(0,204,255,0.08);
      border: 1px solid rgba(0,204,255,0.35);
      color: #00CCFF;
      padding: 8px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.15s;
    `;
    chip.onmouseover = () => { chip.style.background = 'rgba(0,204,255,0.18)'; chip.style.borderColor = '#00CCFF'; };
    chip.onmouseout = () => { chip.style.background = 'rgba(0,204,255,0.08)'; chip.style.borderColor = 'rgba(0,204,255,0.35)'; };
    chip.onclick = () => sendChat(text);
    container.appendChild(chip);
  }
}

// ── Conversation state ───────────────────────────────────────────────
let CONVERSATION_ID = localStorage.getItem('lpu_conversation_id') || null;

function newConversation() {
  CONVERSATION_ID = null;
  localStorage.removeItem('lpu_conversation_id');
  chatMessages.innerHTML = '<div style="color:rgba(255,255,255,0.4);font-style:italic;">New conversation. What do you need?</div>';
  chatHistory = [];
}

// ── Message rendering ────────────────────────────────────────────────
function appendUserMessage(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-user';
  wrap.style.cssText = 'margin-bottom:18px;';
  wrap.innerHTML = `
    <div style="display:flex;gap:10px;align-items:baseline;">
      <span style="color:#00CCFF;font-weight:700;letter-spacing:0.5px;font-size:13px;">YOU</span>
      <div style="color:rgba(255,255,255,0.92);line-height:1.6;flex:1;">${escapeHtml(text)}</div>
    </div>`;
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  chatHistory.push({ role: 'user', text });
}

function startAssistantMessage() {
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-assistant';
  wrap.style.cssText = 'margin-bottom:18px;';
  wrap.innerHTML = `
    <div style="display:flex;gap:10px;align-items:flex-start;">
      <span style="color:#ff6b6b;font-weight:700;letter-spacing:0.5px;font-size:13px;flex-shrink:0;margin-top:2px;">TB</span>
      <div style="flex:1;min-width:0;">
        <div class="tool-cards" style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;"></div>
        <div class="assistant-text markdown-body" style="color:rgba(255,255,255,0.92);line-height:1.6;"></div>
        <div class="assistant-chips" style="display:none;"></div>
        <div class="msg-actions" style="display:none;gap:8px;margin-top:10px;opacity:0.6;font-size:12px;">
          <span style="cursor:pointer;" class="copy-btn">Copy</span>
          <span style="cursor:pointer;" class="regen-btn">Regenerate</span>
          <span style="cursor:pointer;" class="thumb-up">👍</span>
          <span style="cursor:pointer;" class="thumb-down">👎</span>
        </div>
      </div>
    </div>`;
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return {
    wrap,
    toolCards: wrap.querySelector('.tool-cards'),
    textEl: wrap.querySelector('.assistant-text'),
    chipsEl: wrap.querySelector('.assistant-chips'),
    actionsEl: wrap.querySelector('.msg-actions'),
    currentText: '',
  };
}

function appendToolCard(container, tool, display, agent) {
  const card = document.createElement('div');
  card.className = 'tool-card';
  card.dataset.tool = tool;
  const agentBadge = agent && agent !== 'lpu-top-bot'
    ? `<span style="color:rgba(0,204,255,0.8);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-right:8px;">${agentLabel(agent)}</span>`
    : '';
  card.style.cssText = 'display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(0,204,255,0.06);border:1px solid rgba(0,204,255,0.2);border-radius:8px;font-size:13px;color:rgba(255,255,255,0.8);';
  card.innerHTML = `
    <span class="spinner" style="width:12px;height:12px;border:2px solid rgba(0,204,255,0.2);border-top-color:#00CCFF;border-radius:50%;animation:spin 0.8s linear infinite;"></span>
    ${agentBadge}
    <span class="tool-display">${escapeHtml(display)}</span>
    <span class="tool-summary" style="margin-left:auto;color:rgba(255,255,255,0.5);font-size:12px;"></span>`;
  container.appendChild(card);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return card;
}

function agentLabel(agentKey) {
  const map = {
    'lpu-top-bot': 'Top Bot',
    'lpu-recruitment-manager': 'Recruitment Manager',
    'lpu-credentialing-manager': 'Credentialing Manager',
    'lpu-scheduling-manager': 'Scheduling Manager',
    'lpu-agent-1-job-sourcing': 'Agent 1',
    'lpu-agent-2-physician-finder': 'Agent 2',
  };
  return map[agentKey] || agentKey;
}

function finalizeToolCard(card, summary, isError) {
  if (!card) return;
  const spinner = card.querySelector('.spinner');
  if (spinner) {
    spinner.outerHTML = `<span style="color:${isError ? '#F87171' : '#34D399'};font-size:14px;">${isError ? '✕' : '✓'}</span>`;
  }
  const sumEl = card.querySelector('.tool-summary');
  if (sumEl) sumEl.textContent = summary || '';
}

// ── SSE chat send ────────────────────────────────────────────────────
let lastUserMessage = '';

async function sendChat(messageOverride) {
  const message = (messageOverride !== undefined ? messageOverride : chatInput.value).trim();
  if (!message || !AUTH) return;
  chatInput.value = '';
  lastUserMessage = message;

  if (chatHistory.length === 0) chatMessages.innerHTML = '';

  appendUserMessage(message);
  const assistant = startAssistantMessage();
  addActivity('TB', 'Chat session started');

  // Map tool_use_ids to card elements so we can update them on tool.result
  const cardsByToolUseId = new Map();
  let seenToolUseIdForTool = new Map(); // most recent card per tool name (fallback)

  try {
    const res = await fetch(`${BACKEND}/topbot/chat/stream`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': AUTH,
      },
      body: JSON.stringify({
        message,
        conversation_id: CONVERSATION_ID,
      }),
    });

    if (!res.ok || !res.body) {
      assistant.textEl.innerHTML = '<em style="color:rgba(255,255,255,0.5);">Having trouble reaching the session. Try again in a moment.</em>';
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      // SSE frames are separated by \n\n
      const frames = buffer.split('\n\n');
      buffer = frames.pop() || '';
      for (const frame of frames) {
        if (!frame.trim()) continue;
        const lines = frame.split('\n');
        let eventType = 'message';
        let dataStr = '';
        for (const line of lines) {
          if (line.startsWith('event: ')) eventType = line.slice(7).trim();
          else if (line.startsWith('data: ')) dataStr += line.slice(6);
        }
        let data = {};
        try { data = JSON.parse(dataStr); } catch (_) {}

        if (eventType === 'session_started') {
          if (data.conversation_id) {
            CONVERSATION_ID = data.conversation_id;
            localStorage.setItem('lpu_conversation_id', CONVERSATION_ID);
          }
        } else if (eventType === 'tool_start') {
          const card = appendToolCard(assistant.toolCards, data.tool, data.display || data.tool, data.agent);
          if (data.input && typeof data.input === 'object') {
            card.dataset.input = JSON.stringify(data.input);
          }
          if (data.tool_use_id) cardsByToolUseId.set(data.tool_use_id, card);
          seenToolUseIdForTool.set(data.tool, card);
        } else if (eventType === 'tool_result') {
          // Find card by tool_use_id if present, else fall back to last seen for tool name
          let card = data.tool_use_id && cardsByToolUseId.get(data.tool_use_id);
          if (!card) card = seenToolUseIdForTool.get(data.tool);
          finalizeToolCard(card, data.output_summary, data.is_error);
        } else if (eventType === 'text_delta') {
          assistant.currentText += data.text || '';
          assistant.textEl.innerHTML = renderMarkdown(assistant.currentText);
          chatMessages.scrollTop = chatMessages.scrollHeight;
        } else if (eventType === 'agent_message') {
          // Full agent message block; replace current streamed text
          if (data.text) {
            assistant.currentText = data.text;
            assistant.textEl.innerHTML = renderMarkdown(assistant.currentText);
          }
        } else if (eventType === 'done') {
          if (data.final_text && !assistant.currentText.trim()) {
            assistant.currentText = data.final_text;
          }
          // Extract clickable chips from [chip text] patterns and re-render
          const { textSansChips, chips } = extractChips(assistant.currentText);
          assistant.textEl.innerHTML = renderMarkdown(textSansChips);
          renderChips(assistant.chipsEl, chips);
          // Attach message actions
          if (data.assistant_message_id) {
            assistant.wrap.dataset.messageId = data.assistant_message_id;
          }
          assistant.actionsEl.style.display = 'flex';
          wireMessageActions(assistant);
          addActivity('TB', `Chat: ${data.tool_call_count || 0} tool calls`);
          refreshAgentStatuses();
        } else if (eventType === 'error') {
          assistant.textEl.innerHTML = `<em style="color:rgba(255,255,255,0.5);">${escapeHtml(data.message || 'Working on getting that for you. Ask again in a moment.')}</em>`;
        }
      }
    }
  } catch (err) {
    assistant.textEl.innerHTML = `<em style="color:rgba(255,255,255,0.5);">Connection interrupted. Try again.</em>`;
  }
}

function wireMessageActions(assistant) {
  const copyBtn = assistant.actionsEl.querySelector('.copy-btn');
  const regenBtn = assistant.actionsEl.querySelector('.regen-btn');
  const thumbUp = assistant.actionsEl.querySelector('.thumb-up');
  const thumbDown = assistant.actionsEl.querySelector('.thumb-down');
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(assistant.currentText);
    copyBtn.textContent = 'Copied';
    setTimeout(() => copyBtn.textContent = 'Copy', 1500);
  });
  regenBtn.addEventListener('click', () => {
    if (lastUserMessage) sendChat(lastUserMessage);
  });
  thumbUp.addEventListener('click', () => rateMessage(assistant, 1, thumbUp));
  thumbDown.addEventListener('click', () => rateMessage(assistant, -1, thumbDown));
}

async function rateMessage(assistant, rating, btn) {
  const mid = assistant.wrap.dataset.messageId;
  if (!mid) return;
  try {
    await fetch(`${BACKEND}/topbot/chat/rate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': AUTH },
      body: JSON.stringify({ message_id: mid, rating }),
    });
    btn.style.opacity = '1';
    btn.style.color = rating > 0 ? '#34D399' : '#F87171';
  } catch (_) {}
}

// ── Floating chat: toggle + drag ─────────────────────────────────────
function toggleChat() {
  const win = document.getElementById('chatWindow');
  const tab = document.getElementById('chatTab');
  if (win.style.display === 'none') {
    win.style.display = 'block';
    tab.style.display = 'none';
    document.getElementById('chatInput').focus();
  } else {
    win.style.display = 'none';
    tab.style.display = 'flex';
  }
}

// Drag handler for the title bar
(function() {
  const floatEl = document.getElementById('chatFloat');
  const titleBar = document.getElementById('chatTitleBar');
  let isDragging = false, startX, startY, startLeft, startTop;

  titleBar.addEventListener('mousedown', (e) => {
    isDragging = true;
    const rect = floatEl.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    startLeft = rect.left;
    startTop = rect.top;
    // Switch from bottom/right to top/left positioning for drag
    floatEl.style.left = rect.left + 'px';
    floatEl.style.top = rect.top + 'px';
    floatEl.style.right = 'auto';
    floatEl.style.bottom = 'auto';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    floatEl.style.left = (startLeft + dx) + 'px';
    floatEl.style.top = (startTop + dy) + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      // Save position
      localStorage.setItem('chatPos', JSON.stringify({
        left: floatEl.style.left, top: floatEl.style.top,
      }));
    }
  });

  // Restore position
  const saved = localStorage.getItem('chatPos');
  if (saved) {
    try {
      const pos = JSON.parse(saved);
      floatEl.style.left = pos.left;
      floatEl.style.top = pos.top;
      floatEl.style.right = 'auto';
      floatEl.style.bottom = 'auto';
    } catch (_) {}
  }
})();

// Boot: load sprites. Data polling kicks in only once auth is ready.
let _pollIntervalHandle = null;
function startPolling() {
  if (_pollIntervalHandle) return;
  pollData();
  _pollIntervalHandle = setInterval(pollData, 60000);
}
// Override onAuthReady (defined in the auth block) to wire polling
const _origOnAuthReady = onAuthReady;
onAuthReady = function() {
  if (typeof _origOnAuthReady === 'function') _origOnAuthReady();
  startPolling();
};

loadAllSprites().then(() => {
  render();
  renderAgentList();
  setInterval(updateRefreshInfo, 5000);
  // If auth was already resolved before sprites loaded, kick off polling
  if (AUTH) startPolling();
});
